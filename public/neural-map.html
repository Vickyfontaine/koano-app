canvas{display:block}

#tooltip .tt-desc{font-size:12px;color:#5A7A8C;margin-bottom:5px}
#tooltip .tt-conn{font-size:11px;color:#6BB89E}
#panel{position:fixed;bottom:80px;left:16px;width:280px;background:#fff;border:1px solid #E2EEF5;border-radius:16px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,0.1);z-index:25;transform:translateX(-320px);transition:transform .2s}
#panel.visible{transform:translateX(0)}
#panel .p-close{position:absolute;top:12px;right:14px;background:none;border:none;cursor:pointer;font-size:18px;color:#5A7A8C}
#panel .p-name{font-size:16px;font-weight:700;color:#0D2B3E;margin-bottom:4px}
#panel .p-type{font-size:10px;color:#5A7A8C;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
#panel .p-desc{font-size:13px;color:#5A7A8C;line-height:1.5;margin-bottom:10px}
#panel .p-conns{font-size:11px;color:#6BB89E;line-height:1.6}
#legend{position:fixed;bottom:16px;left:16px;background:#fff;border-radius:12px;padding:12px 16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);z-index:20;font-size:11px;color:#0D2B3E;display:flex;flex-direction:column;gap:6px}
.li{display:flex;align-items:center;gap:8px}
.ld{width:8px;height:8px;border-radius:50%}

{source:"s1",target:"s13",type:"cross"},{source:"s3",target:"s49",type:"cross"},{source:"s7",target:"s37",type:"cross"},{source:"s13",target:"s37",type:"cross"},{source:"s15",target:"s50",type:"cross"},{source:"s25",target:"s38",type:"cross"},{source:"s29",target:"s41",type:"cross"},{source:"s2",target:"s26",type:"cross"},{source:"s8",target:"s45",type:"cross"},{source:"s17",target:"s56",type:"cross"},{source:"s32",target:"s33",type:"cross"},{source:"s40",target:"s44",type:"cross"},{source:"s5",target:"s49",type:"cross"},{source:"s11",target:"s25",type:"cross"},{source:"s22",target:"s46",type:"cross"},{source:"s1",target:"s37",type:"cross"},{source:"s4",target:"s6",type:"cross"},{source:"s7",target:"s8",type:"cross"},{source:"s14",target:"s16",type:"cross"},{source:"s18",target:"s51",type:"cross"},{source:"s23",target:"s52",type:"cross"},{source:"s28",target:"s27",type:"cross"},{source:"s31",target:"s30",type:"cross"},{source:"s38",target:"s42",type:"cross"},{source:"s41",target:"s44",type:"cross"}
];

// ===== D3 FORCE LAYOUT =====
var nodeMap={};nodes.forEach(function(n){nodeMap[n.id]=n});
var sim=d3.forceSimulation(nodes)
.force("link",d3.forceLink(links).id(function(d){return d.id}).distance(function(d){
  if(d.type==="agent-synthesis")return 50;if(d.type==="agent-agent")return 90;
  if(d.type==="source-agent")return 35;if(d.type==="feed-source")return 18;
  if(d.type==="cross")return 45;return 30;
}).strength(function(d){
  if(d.type==="agent-synthesis")return 0.9;if(d.type==="agent-agent")return 0.2;
  if(d.type==="source-agent")return 0.7;if(d.type==="feed-source")return 0.8;
  if(d.type==="cross")return 0.05;return 0.5;
}))
.force("charge",d3.forceManyBody().strength(function(d){
  if(d.type==="synthesis")return -600;if(d.type==="agent")return -250;
  if(d.type==="source")return -60;if(d.type==="feed")return -15;return -30;
}))
.force("center",d3.forceCenter(0,0))
.force("collision",d3.forceCollide().radius(function(d){return d.r+1}))
.stop();
for(var i=0;i<600;i++)sim.tick();

// Map to 3D
nodes.forEach(function(n){
  var z=0;
  if(n.type==='agent')z=(Math.random()-0.5)*30;
  else if(n.type==='source')z=(Math.random()-0.5)*70;
  else if(n.type==='feed')z=(Math.random()-0.5)*100;
  n.pos=new THREE.Vector3(n.x*0.8,n.y*0.8,z);
});

// ===== THREE.JS SCENE =====
var scene=new THREE.Scene();
scene.background=new THREE.Color(0xffffff);
var camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,2000);
camera.position.set(0,0,300);
var renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

var controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.autoRotate=true;controls.autoRotateSpeed=0.5;
controls.enableDamping=true;controls.dampingFactor=0.05;
controls.enableZoom=true;controls.enablePan=false;
controls.minDistance=80;controls.maxDistance=500;

// Lighting — matte
scene.add(new THREE.AmbientLight(0xffffff,1.0));
var dir=new THREE.DirectionalLight(0xffffff,0.3);
dir.position.set(1,1,1);scene.add(dir);

// ===== SPHERES =====
var meshes={};
var allMeshes=[];
nodes.forEach(function(n){
  var geo,mat,segs;
  if(n.type==='synthesis'){segs=32;geo=new THREE.SphereGeometry(10,segs,segs);mat=new THREE.MeshLambertMaterial({color:0xA8C4D4})}
  else if(n.type==='agent'){segs=32;geo=new THREE.SphereGeometry(6,segs,segs);mat=new THREE.MeshLambertMaterial({color:0xE91E8C})}
  else if(n.type==='source'){segs=16;geo=new THREE.SphereGeometry(2.95,segs,segs);mat=new THREE.MeshLambertMaterial({color:0x4A90D9})}
  else{segs=8;geo=new THREE.SphereGeometry(1.77,segs,segs);mat=new THREE.MeshLambertMaterial({color:0x9DD1B8})}
  var mesh=new THREE.Mesh(geo,mat);
  mesh.position.copy(n.pos);
  mesh.userData=n;
  scene.add(mesh);
  meshes[n.id]=mesh;n.mesh=mesh;n.mat=mat;
  allMeshes.push(mesh);
});

// Halos
function makeHaloSprite(color,size,opacity){
  var c=document.createElement('canvas');c.width=128;c.height=128;
  var ctx=c.getContext('2d');
  var g=ctx.createRadialGradient(64,64,0,64,64,64);
  var r=(color>>16)&255,gv=(color>>8)&255,b=color&255;
  g.addColorStop(0,'rgba('+r+','+gv+','+b+','+opacity+')');
  g.addColorStop(0.5,'rgba('+r+','+gv+','+b+','+(opacity*0.3)+')');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,128,128);
  var tex=new THREE.CanvasTexture(c);
  var mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
  var sprite=new THREE.Sprite(mat);
  sprite.scale.set(size,size,1);
  return sprite;
}
var synthHalo=makeHaloSprite(0xA8C4D4,60,0.15);
synthHalo.position.copy(meshes['synthesis'].position);scene.add(synthHalo);
['a1','a2','a3','a4','a5'].forEach(function(id){
  var h=makeHaloSprite(0xE91E8C,24,0.1);
  h.position.copy(meshes[id].position);scene.add(h);
});

// ===== CURVED TUBE EDGES =====
var tubeRadii={'agent-synthesis':0.4,'agent-agent':0.2,'source-agent':0.15,'feed-source':0.15,'cross':0.1};
var tubeColors={'agent-synthesis':0xA8C4D4,'agent-agent':0xE91E8C,'source-agent':0x4A90D9,'feed-source':0x9DD1B8,'cross':0xE2EEF5};
var tubeOpacities={'agent-synthesis':0.9,'agent-agent':0.35,'source-agent':0.55,'feed-source':0.45,'cross':0.3};

function makeCurvedTube(s,e,linkType){
  var mid=new THREE.Vector3().addVectors(s,e).multiplyScalar(0.5);
  mid.x+=(Math.random()-0.5)*40;
  mid.y+=(Math.random()-0.5)*40;
  mid.z+=(Math.random()-0.5)*20;
  var curve=new THREE.QuadraticBezierCurve3(s.clone(),mid,e.clone());
  var tr=tubeRadii[linkType]||0.1;
  var geo=new THREE.TubeGeometry(curve,20,tr,6,false);
  var col=tubeColors[linkType]||0xCCCCCC;
  var op=tubeOpacities[linkType]||0.3;
  var mat=new THREE.MeshLambertMaterial({color:col,transparent:true,opacity:op});
  var mesh=new THREE.Mesh(geo,mat);
  return{mesh:mesh,curve:curve,mat:mat,baseOpacity:op};
}

var edgeObjects=[];
links.forEach(function(l){
  var sn=meshes[l.source.id],tn=meshes[l.target.id];
  if(!sn||!tn)return;
  var obj=makeCurvedTube(sn.position,tn.position,l.type);
  scene.add(obj.mesh);
  l.lineObj=obj;l.baseOpacity=obj.baseOpacity;
});

// ===== PARTICLES on agent-synthesis edges =====
var particles=[];
links.forEach(function(l){
  if(l.type!=='agent-synthesis')return;
  for(var p=0;p<4;p++){
    var geo=new THREE.SphereGeometry(0.8,6,6);
    var mat=new THREE.MeshLambertMaterial({color:0xA8C4D4});
    var mesh=new THREE.Mesh(geo,mat);
    scene.add(mesh);
    particles.push({mesh:mesh,curve:l.lineObj.curve,t:p/4,speed:0.002+Math.random()*0.002});
  }
});

// ===== LABELS =====
var labelContainer=document.createElement('div');
labelContainer.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;overflow:hidden';
document.body.appendChild(labelContainer);
var labelEls={};
nodes.forEach(function(n){
  var el=document.createElement('div');
  el.className='node-label t-'+n.type;
  if(n.type==='source'||n.type==='feed')el.classList.add('hidden');
  el.textContent=n.label;
  labelContainer.appendChild(el);
  labelEls[n.id]=el;
});

function updateLabels(){
  var hw=innerWidth/2,hh=innerHeight/2;
  nodes.forEach(function(n){
    var el=labelEls[n.id];if(!el)return;
    var v=n.pos.clone().project(camera);
    if(v.z>1){el.style.display='none';return}
    el.style.display='';
    var x=v.x*hw+hw;var y=-v.y*hh+hh;
    el.style.transform='translate(-50%,-100%) translate('+x+'px,'+(y-n.r*2-10)+'px)';
  });
}

// ===== INTERACTION =====
var raycaster=new THREE.Raycaster();
var mouse=new THREE.Vector2();
var hoveredNode=null,selectedNode=null;
var tooltip=document.getElementById('tooltip');
var panel=document.getElementById('panel');

function connSet(n){
  var s=new Set();s.add(n.id);
  links.forEach(function(l){if(l.source.id===n.id)s.add(l.target.id);if(l.target.id===n.id)s.add(l.source.id)});
  return s;
}

function highlight(node){
  var cs=connSet(node);
  nodes.forEach(function(n){
    var c=cs.has(n.id);
    n.mat.transparent=true;
    n.mat.opacity=c?1:(selectedNode?0.08:0.15);
    n.mesh.scale.setScalar(n===node?1.5:1);
  });
  links.forEach(function(l){
    if(!l.lineObj)return;
    var c=cs.has(l.source.id)&&cs.has(l.target.id);
    l.lineObj.mat.opacity=c?l.baseOpacity:(selectedNode?0.02:0.05);
  });
  // Show source/feed labels if connected
  nodes.forEach(function(n){
    var el=labelEls[n.id];if(!el)return;
    if(n.type==='source'||n.type==='feed'){
      el.classList.toggle('hidden',!cs.has(n.id));
    }
  });
}

function resetHighlight(){
  nodes.forEach(function(n){n.mat.opacity=1;n.mat.transparent=false;n.mesh.scale.setScalar(1)});
  links.forEach(function(l){if(l.lineObj)l.lineObj.mat.opacity=l.baseOpacity});
  nodes.forEach(function(n){
    var el=labelEls[n.id];if(!el)return;
    if(n.type==='source'||n.type==='feed')el.classList.add('hidden');
  });
}

window.addEventListener('pointermove',function(e){
  mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  var hits=raycaster.intersectObjects(allMeshes,false);
  var node=hits.length?hits[0].object.userData:null;
  if(node!==hoveredNode){
    if(hoveredNode&&!selectedNode)resetHighlight();
    hoveredNode=node;
    if(node&&!selectedNode)highlight(node);
    if(node){showTooltip(node,e.clientX,e.clientY);renderer.domElement.style.cursor='pointer'}
    else{tooltip.style.opacity='0';renderer.domElement.style.cursor='grab'}
  }else if(node){tooltip.style.left=(e.clientX+16)+'px';tooltip.style.top=(e.clientY-20)+'px'}
});

renderer.domElement.addEventListener('click',function(){
  if(hoveredNode){
    if(selectedNode===hoveredNode){selectedNode=null;resetHighlight();closePanel()}
    else{selectedNode=hoveredNode;highlight(hoveredNode);showPanel(hoveredNode)}
  }else{selectedNode=null;resetHighlight();closePanel()}
});

function showTooltip(n,x,y){
  tooltip.querySelector('.tt-name').textContent=n.label;
  tooltip.querySelector('.tt-type').textContent={synthesis:'Synthesis Agent',agent:'Specialist Agent',source:'Data Source',feed:'Sub-feed'}[n.type];
  var d=tooltip.querySelector('.tt-desc');if(n.desc){d.textContent=n.desc;d.style.display=''}else d.style.display='none';
  var conns=[];links.forEach(function(l){
    if(l.source.id===n.id){var t=nodeMap[l.target.id];if(t&&t.type!=='feed')conns.push(t.label)}
    if(l.target.id===n.id){var s=nodeMap[l.source.id];if(s&&s.type!=='feed')conns.push(s.label)}
  });
  var ce=tooltip.querySelector('.tt-conn');
  if(conns.length&&conns.length<=8){ce.textContent='Connected: '+conns.join(', ');ce.style.display=''}else ce.style.display='none';
  tooltip.style.left=(x+16+240>innerWidth?x-256:x+16)+'px';
  tooltip.style.top=(y-20)+'px';tooltip.style.opacity='1';
}

function showPanel(n){
  panel.querySelector('.p-name').textContent=n.label;
  panel.querySelector('.p-type').textContent={synthesis:'Synthesis Agent',agent:'Specialist Agent',source:'Data Source',feed:'Sub-feed'}[n.type];
  panel.querySelector('.p-desc').textContent=n.desc||'';
  var conns=[];links.forEach(function(l){
    if(l.source.id===n.id)conns.push(nodeMap[l.target.id].label);
    if(l.target.id===n.id)conns.push(nodeMap[l.source.id].label);
  });
  panel.querySelector('.p-conns').textContent=conns.length?'Connected to: '+conns.join(', '):'';
  panel.classList.add('visible');
}
function closePanel(){panel.classList.remove('visible')}
window.closePanel=closePanel;

// ===== ANIMATE =====
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  particles.forEach(function(p){
    p.t=(p.t+p.speed)%1;
    var pt=p.curve.getPoint(p.t);
    p.mesh.position.copy(pt);
  });
  updateLabels();
  renderer.render(scene,camera);
}
window.addEventListener('resize',function(){
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
animate();
})();
</script>
