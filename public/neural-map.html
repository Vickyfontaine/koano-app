<head>

<title>KOANO — Agent Network</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1B3A6B; font-family: 'Neue Montreal', system-ui, sans-serif; }
  canvas { display: block; }
  #bg-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
  }
  #star-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
    pointer-events: none;
  }
  #three-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
  }
  #error-display {
    position: fixed; top: 10px; left: 10px; right: 10px;
    background: rgba(239,68,68,0.95); color: white;
    font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 12px 16px; border-radius: 8px; z-index: 100;
    display: none; white-space: pre-wrap; max-height: 200px; overflow-y: auto;
  }
  #tooltip {
    position: fixed; pointer-events: none;
    background: rgba(10,22,40,0.9); border: 1px solid rgba(233,30,140,0.3);
    border-radius: 12px; padding: 10px 14px; max-width: 240px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4); opacity: 0;
    transition: opacity 0.15s ease; z-index: 10;
  }
  #tooltip .name { font-size: 13px; font-weight: 500; color: #FFFFFF; line-height: 1.3; }
  #tooltip .desc {
    font-family: 'DM Mono', monospace; font-size: 11px; color: #A8D8EA;
    letter-spacing: 0.04em; line-height: 1.4; margin-top: 4px;
  }
  #legend {
    position: fixed; bottom: 16px; left: 16px;
    display: flex; flex-direction: column; gap: 6px; pointer-events: none; z-index: 5;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-label {
    font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(168,216,234,0.7);
    letter-spacing: 0.06em; text-transform: uppercase;
  }

<script>
window.onerror = function(msg, src, line) {
  var el = document.getElementById('error-display');
  el.style.display = 'block';
  el.textContent += 'ERROR: ' + msg + ' (line ' + line + ')\n';
};
window.addEventListener('unhandledrejection', function(e) {
  var el = document.getElementById('error-display');
  el.style.display = 'block';
  el.textContent += 'REJECTED: ' + (e.reason && e.reason.message || e.reason) + '\n';
});
</script>

<script>
// ==================== 2D BACKGROUND (gradient + nebulae only) ====================
(function() {
  var c = document.getElementById('bg-canvas');
  var ctx = c.getContext('2d');

  function drawBG() {
    c.width = innerWidth;
    c.height = innerHeight;
    var h = c.height;

    var grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#1B3A6B');
    grad.addColorStop(0.30, '#2E5F9E');
    grad.addColorStop(0.60, '#6B3A2A');
    grad.addColorStop(0.82, '#C4621A');
    grad.addColorStop(1, '#8B3200');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, c.width, h);

    var nebulae = [
      { x: 0.15, y: 0.22, rx: 350, ry: 200, color: 'rgba(80,140,255,0.03)' },
      { x: 0.78, y: 0.15, rx: 280, ry: 180, color: 'rgba(100,160,255,0.025)' },
      { x: 0.55, y: 0.72, rx: 400, ry: 220, color: 'rgba(255,140,60,0.03)' },
      { x: 0.22, y: 0.82, rx: 300, ry: 160, color: 'rgba(255,120,40,0.025)' },
    ];
    nebulae.forEach(function(n) {
      ctx.save();
      ctx.translate(c.width * n.x, h * n.y);
      ctx.scale(n.rx / 100, n.ry / 100);
      var g = ctx.createRadialGradient(0, 0, 0, 0, 0, 100);
      g.addColorStop(0, n.color);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(-100, -100, 200, 200);
      ctx.restore();
    });
  }

  drawBG();
  window.addEventListener('resize', drawBG);
})();

// ==================== PARALLAX STAR LAYERS ====================
var _starLayers = [];
var _starCanvas = document.getElementById('star-canvas');
var _starCtx = _starCanvas.getContext('2d');
var _starOffsetX = 0, _starOffsetY = 0;

(function() {
  function genLayer(count, minR, maxR, minA, maxA) {
    var stars = [];
    for (var i = 0; i < count; i++) {
      stars.push({
        x: Math.random(), y: Math.random(),
        r: minR + Math.random() * (maxR - minR),
        a: minA + Math.random() * (maxA - minA),
      });
    }
    return stars;
  }

  _starLayers = [
    { stars: genLayer(600, 0.3, 0.8, 0.4, 0.7), speed: 0.1 },
    { stars: genLayer(300, 0.8, 1.4, 0.6, 0.9), speed: 0.3 },
    { stars: genLayer(100, 1.2, 2.0, 0.8, 1.0), speed: 0.6 },
  ];
})();

function drawStars(ox, oy) {
  var w = innerWidth, h = innerHeight;
  _starCanvas.width = w;
  _starCanvas.height = h;
  _starCtx.clearRect(0, 0, w, h);

  for (var l = 0; l < _starLayers.length; l++) {
    var layer = _starLayers[l];
    var dx = ox * layer.speed;
    var dy = oy * layer.speed;
    var stars = layer.stars;
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      var sx = ((s.x * w + dx) % w + w) % w;
      var sy = ((s.y * h + dy) % h + h) % h;
      _starCtx.beginPath();
      _starCtx.arc(sx, sy, s.r, 0, Math.PI * 2);
      _starCtx.fillStyle = 'rgba(255,255,255,' + s.a + ')';
      _starCtx.fill();
    }
  }
}
drawStars(0, 0);
window.addEventListener('resize', function() { drawStars(_starOffsetX, _starOffsetY); });
</script>

<script type="module">
import * as THREE from 'three';

// ==================== DATA ====================

var AGENTS = [
  {
    name: 'Market timing',
    desc: 'Pricing velocity, DOM trends, absorption rates',
    sizeMult: 1.0,
    leaves: ['US Census ACS','Redfin Data Center','FHFA','Freddie Mac','BLS','ATTOM','HouseCanary','Google Trends','Zillow API','CoreLogic']
  },
  {
    name: 'Infrastructure',
    desc: 'DOT data, permits, zoning variances, municipal bonds',
    sizeMult: 1.1,
    leaves: ['Shovels.ai','DOT Data','Zoneomics','MSRB EMMA','NYC Open Data','LA GeoHub','Chicago Data Portal','OpenStreetMap','Regrid','Municipode']
  },
  {
    name: 'Demand sentiment',
    desc: 'Foot traffic, search trends, review velocity',
    sizeMult: 0.9,
    leaves: ['Placer.ai','Walk Score','Yelp Fusion','Google Places','SafeGraph','Reddit API','AirDNA','GreatSchools','Yelp','BatchData']
  },
  {
    name: 'Risk & volatility',
    desc: 'Climate risk, crime data, STR saturation',
    sizeMult: 1.05,
    leaves: ['First Street','FBI UCR','FEMA','AirDNA','SpotCrime','NOAA','EPA','CDC PLACES','OpenFEMA','USGS']
  },
  {
    name: 'Regulatory & policy',
    desc: 'Zoning, city council decisions, opportunity zones',
    sizeMult: 0.85,
    leaves: ['Zoneomics','HUD USER','IRS Opp Zones','Municipode','HUD Fair Housing','SEC EDGAR','World Bank','OECD','Reonomy','CoStar']
  }
];

// ==================== ORBIT CONTROLS ====================

class OrbitControls {
  constructor(obj, dom) {
    this.object = obj; this.domElement = dom; this.enabled = true;
    this.target = new THREE.Vector3();
    this.minDistance = 3; this.maxDistance = 22;
    this.autoRotate = true; this.autoRotateSpeed = 0.3;
    this.rotateSpeed = 0.8; this.zoomSpeed = 1.0;
    this.minPolarAngle = Math.PI * 0.1; this.maxPolarAngle = Math.PI * 0.85;
    this._idleTimer = null; this._userInteracting = false;
    this.thetaAccum = 0; this.phiAccum = 0;

    var scope = this, STATE = { NONE: -1, ROTATE: 0, TR: 3, TZ: 4 };
    var state = STATE.NONE;
    var spherical = new THREE.Spherical(), sphericalDelta = new THREE.Spherical();
    var scl = 1, rs = new THREE.Vector2(), re = new THREE.Vector2(), rd = new THREE.Vector2();
    var offset = new THREE.Vector3();
    var quat = new THREE.Quaternion().setFromUnitVectors(obj.up, new THREE.Vector3(0,1,0));
    var quatI = quat.clone().invert();

    function resumeAutoRotate() {
      scope._userInteracting = false;
      scope.autoRotate = true;
    }
    function pauseAutoRotate() {
      scope._userInteracting = true;
      scope.autoRotate = false;
      clearTimeout(scope._idleTimer);
      scope._idleTimer = setTimeout(resumeAutoRotate, 3000);
    }

    this.update = function() {
      var pos = scope.object.position;
      offset.copy(pos).sub(scope.target).applyQuaternion(quat);
      spherical.setFromVector3(offset);
      var autoD = 0;
      if (scope.autoRotate && state === STATE.NONE) {
        autoD = (2*Math.PI/60/60) * scope.autoRotateSpeed;
        spherical.theta -= autoD;
      }
      scope.thetaAccum += sphericalDelta.theta + autoD;
      scope.phiAccum += sphericalDelta.phi;
      spherical.theta += sphericalDelta.theta;
      spherical.phi += sphericalDelta.phi;
      spherical.phi = Math.max(scope.minPolarAngle, Math.min(scope.maxPolarAngle, spherical.phi));
      spherical.radius *= scl;
      spherical.radius = Math.max(scope.minDistance, Math.min(scope.maxDistance, spherical.radius));
      spherical.makeSafe();
      offset.setFromSpherical(spherical).applyQuaternion(quatI);
      pos.copy(scope.target).add(offset);
      scope.object.lookAt(scope.target);
      sphericalDelta.set(0,0,0); scl = 1;
    };

    function onMD(e) {
      if (!scope.enabled || e.button !== 0) return;
      e.preventDefault(); state = STATE.ROTATE;
      rs.set(e.clientX, e.clientY); pauseAutoRotate();
      document.addEventListener('mousemove', onMM);
      document.addEventListener('mouseup', onMU);
    }
    function onMM(e) {
      if (state !== STATE.ROTATE) return;
      re.set(e.clientX, e.clientY); rd.subVectors(re, rs);
      sphericalDelta.theta -= (2*Math.PI*rd.x/dom.clientHeight)*scope.rotateSpeed;
      sphericalDelta.phi -= (2*Math.PI*rd.y/dom.clientHeight)*scope.rotateSpeed;
      rs.copy(re);
    }
    function onMU() {
      state = STATE.NONE;
      document.removeEventListener('mousemove', onMM);
      document.removeEventListener('mouseup', onMU);
    }
    function onWh(e) {
      if (!scope.enabled) return;
      e.preventDefault(); pauseAutoRotate();
      scl *= Math.pow(0.95, e.deltaY > 0 ? scope.zoomSpeed : -scope.zoomSpeed);
    }
    var tpd = 0, trs = new THREE.Vector2();
    function onTS(e) {
      if (!scope.enabled) return; e.preventDefault(); pauseAutoRotate();
      if (e.touches.length === 1) { state = STATE.TR; trs.set(e.touches[0].pageX, e.touches[0].pageY); }
      else if (e.touches.length === 2) {
        state = STATE.TZ;
        var dx = e.touches[0].pageX-e.touches[1].pageX, dy = e.touches[0].pageY-e.touches[1].pageY;
        tpd = Math.sqrt(dx*dx+dy*dy);
      }
    }
    function onTM(e) {
      if (!scope.enabled) return; e.preventDefault();
      if (state === STATE.TR && e.touches.length === 1) {
        rd.set(e.touches[0].pageX-trs.x, e.touches[0].pageY-trs.y);
        sphericalDelta.theta -= (2*Math.PI*rd.x/dom.clientHeight)*scope.rotateSpeed;
        sphericalDelta.phi -= (2*Math.PI*rd.y/dom.clientHeight)*scope.rotateSpeed;
        trs.set(e.touches[0].pageX, e.touches[0].pageY);
      } else if (state === STATE.TZ && e.touches.length === 2) {
        var dx = e.touches[0].pageX-e.touches[1].pageX, dy = e.touches[0].pageY-e.touches[1].pageY;
        var d = Math.sqrt(dx*dx+dy*dy);
        scl *= d > tpd ? 1/Math.pow(0.95,scope.zoomSpeed) : Math.pow(0.95,scope.zoomSpeed);
        tpd = d;
      }
    }
    function onTE() { state = STATE.NONE; }
    dom.addEventListener('mousedown', onMD);
    dom.addEventListener('wheel', onWh, {passive:false});
    dom.addEventListener('touchstart', onTS, {passive:false});
    dom.addEventListener('touchmove', onTM, {passive:false});
    dom.addEventListener('touchend', onTE);
    dom.addEventListener('contextmenu', function(e){e.preventDefault();});
    this.update();
  }
}

// ==================== SCENE ====================

var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 2.5, 11);
camera.lookAt(0, 0, 0);

var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);
renderer.domElement.id = 'three-canvas';
document.body.appendChild(renderer.domElement);

var controls = new OrbitControls(camera, renderer.domElement);

// Lighting — warm from below (sunset), cool from above (sky)
scene.add(new THREE.AmbientLight(0x2A3A5A, 0.4));
var warmLight = new THREE.PointLight(0xFF8C00, 0.8, 40);
warmLight.position.set(0, -6, 0);
scene.add(warmLight);
var coolLight = new THREE.PointLight(0x4169E1, 0.6, 40);
coolLight.position.set(0, 8, 2);
scene.add(coolLight);
var keyLight = new THREE.DirectionalLight(0xFFFFFF, 0.5);
keyLight.position.set(3, 5, 5);
scene.add(keyLight);

var pivot = new THREE.Group();
scene.add(pivot);

// ==================== NODE FACTORY ====================

function makeSphere(radius, color, emissive, emissiveI) {
  return new THREE.Mesh(
    new THREE.SphereGeometry(radius, 48, 48),
    new THREE.MeshPhongMaterial({
      color: color, emissive: emissive, emissiveIntensity: emissiveI,
      shininess: 60, specular: 0x222222,
      transparent: true, opacity: 0.95,
    })
  );
}

function addHalo(parent, radius, color, opacity) {
  var m = new THREE.Mesh(
    new THREE.SphereGeometry(radius, 24, 24),
    new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: opacity, depthWrite: false, side: THREE.BackSide })
  );
  parent.add(m);
  return m;
}

// ==================== LABELS ====================

function makeLabel(text, yOffset, style) {
  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d');
  canvas.width = 512; canvas.height = 80;

  var fontSize = style === 'hub' ? 46 : style === 'agent' ? 38 : 30;
  var weight = style === 'hub' ? '700' : '500';
  ctx.font = weight + ' ' + fontSize + 'px "Neue Montreal", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.shadowColor = style === 'hub' ? 'rgba(255,215,0,0.8)' : style === 'agent' ? 'rgba(233,30,140,0.6)' : 'rgba(168,216,234,0.4)';
  ctx.shadowBlur = style === 'hub' ? 14 : 8;
  ctx.fillStyle = style === 'leaf' ? '#A8D8EA' : '#FFFFFF';
  ctx.fillText(text, canvas.width/2, canvas.height/2);
  ctx.shadowBlur = 0;
  ctx.fillText(text, canvas.width/2, canvas.height/2);

  var tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  var sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false }));
  var w = style === 'leaf' ? 1.5 : style === 'hub' ? 2.4 : 2.0;
  var h = style === 'leaf' ? 0.23 : 0.32;
  sprite.scale.set(w, h, 1);
  sprite.position.y = yOffset;
  sprite.userData.labelStyle = style;
  return sprite;
}

// ==================== BUILD GRAPH ====================

var allNodes = [];
var srcToAgentEdges = [];
var agentToHubEdges = [];

// Hub — Synthesis Agent: #FFD700 core, 5 glow layers
var hubR = 0.5;
var hubMesh = makeSphere(hubR, 0xFFD700, 0xFF6B00, 0.9);
pivot.add(hubMesh);
hubMesh.add(makeLabel('Synthesis Agent', 0.85, 'hub'));
var hubHalo1 = addHalo(hubMesh, hubR * 1.5, 0xFFD700, 0.6);
var hubHalo2 = addHalo(hubMesh, hubR * 2.2, 0xFFB347, 0.4);
var hubHalo3 = addHalo(hubMesh, hubR * 3.5, 0xFF8C00, 0.25);
var hubHalo4 = addHalo(hubMesh, hubR * 5.0, 0xFF4500, 0.12);
var hubHalo5 = addHalo(hubMesh, hubR * 8.0, 0xFF2200, 0.05);
allNodes.push({ mesh: hubMesh, name: 'Synthesis Agent', desc: 'Receives all 5 agent outputs simultaneously and issues a unified verdict with full reasoning chain', type: 'hub', phase: 0, baseR: hubR });

// Agents + Leaves
var agentOrbitR = 4.5;
var agentYSeeds = [-0.6, 0.5, -0.2, 0.7, -0.4];
var agentBaseR = 0.3;

AGENTS.forEach(function(agent, ai) {
  var angle = (ai / AGENTS.length) * Math.PI * 2 - Math.PI / 2;
  var ax = Math.cos(angle) * agentOrbitR;
  var az = Math.sin(angle) * agentOrbitR;
  var ay = agentYSeeds[ai];
  var r = agentBaseR * agent.sizeMult;

  // Specialist agents: #E91E8C core, #FF4DB8 inner highlight
  var agentMesh = makeSphere(r, 0xE91E8C, 0xFF4DB8, 0.6);
  agentMesh.position.set(ax, ay, az);
  pivot.add(agentMesh);
  agentMesh.add(makeLabel(agent.name, r + 0.28, 'agent'));
  addHalo(agentMesh, r * 1.7, 0xE91E8C, 0.4);
  addHalo(agentMesh, r * 2.8, 0xC2185B, 0.15);

  allNodes.push({ mesh: agentMesh, name: agent.name, desc: agent.desc, type: 'agent', phase: ai * (Math.PI * 2 / 5), baseR: r });
  agentToHubEdges.push({ from: agentMesh.position, to: hubMesh.position });

  var leafOrbitR = 2.0;
  var leafCount = agent.leaves.length;
  var arcSpan = Math.min(leafCount * 0.28, 1.8);

  agent.leaves.forEach(function(leafName, li) {
    var leafFrac = leafCount > 1 ? li / (leafCount - 1) : 0.5;
    var leafAngle = angle + (leafFrac - 0.5) * arcSpan;
    var row = Math.floor(li / 5);
    var rowOffset = row * 0.9;
    var lx = ax + Math.cos(leafAngle) * (leafOrbitR + rowOffset);
    var ly = ay + (leafFrac - 0.5) * 1.8 + (row * 0.5 - 0.25);
    var lz = az + Math.sin(leafAngle) * (leafOrbitR + rowOffset);

    // Data sources: #A8D8EA, single tight glow
    var leafMesh = makeSphere(0.1, 0xA8D8EA, 0x88C8E0, 0.3);
    leafMesh.position.set(lx, ly, lz);
    pivot.add(leafMesh);
    leafMesh.add(makeLabel(leafName, 0.22, 'leaf'));
    addHalo(leafMesh, 0.13, 0xA8D8EA, 0.2);

    allNodes.push({ mesh: leafMesh, name: leafName, desc: null, type: 'leaf', phase: 0, baseR: 0.1 });
    srcToAgentEdges.push({ from: leafMesh.position, to: agentMesh.position });
  });
});

// ==================== CONNECTION LINES ====================

// Source → Agent: #A8D8EA at 0.4 opacity
pivot.add((function() {
  var pts = [];
  for (var i = 0; i < srcToAgentEdges.length; i++) {
    pts.push(srcToAgentEdges[i].from.x, srcToAgentEdges[i].from.y, srcToAgentEdges[i].from.z);
    pts.push(srcToAgentEdges[i].to.x, srcToAgentEdges[i].to.y, srcToAgentEdges[i].to.z);
  }
  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
  return new THREE.LineSegments(geo, new THREE.LineBasicMaterial({ color: 0xA8D8EA, transparent: true, opacity: 0.4 }));
})());

// Agent → Synthesis: per-vertex color gradient from #E91E8C to #FFD700
pivot.add((function() {
  var pts = [], cols = [];
  var cAgent = new THREE.Color(0xE91E8C);
  var cHub = new THREE.Color(0xFFD700);
  for (var i = 0; i < agentToHubEdges.length; i++) {
    var e = agentToHubEdges[i];
    pts.push(e.from.x, e.from.y, e.from.z, e.to.x, e.to.y, e.to.z);
    cols.push(cAgent.r, cAgent.g, cAgent.b, cHub.r, cHub.g, cHub.b);
  }
  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
  return new THREE.LineSegments(geo, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.6 }));
})());

// ==================== PARTICLES ====================

// Source → Agent: cold magenta #E91E8C, 3 per line, speed 0.5
var saPE = 3, saEdges = srcToAgentEdges, saCount = saEdges.length * saPE;
var saPos = new Float32Array(saCount * 3);
var saOff = new Float32Array(saCount);
var saEI = new Uint16Array(saCount);
for (var e = 0; e < saEdges.length; e++)
  for (var p = 0; p < saPE; p++) {
    var i = e * saPE + p;
    saOff[i] = p / saPE + Math.random() * 0.15;
    saEI[i] = e;
  }
var saGeo = new THREE.BufferGeometry();
saGeo.setAttribute('position', new THREE.BufferAttribute(saPos, 3));
pivot.add(new THREE.Points(saGeo, new THREE.PointsMaterial({
  color: 0xE91E8C, size: 0.05, transparent: true, opacity: 0.85,
  sizeAttenuation: true, depthWrite: false,
})));

// Agent → Hub: bright gold #FFD700, 6 per line, speed 0.8
var ahPE = 6, ahEdges = agentToHubEdges, ahCount = ahEdges.length * ahPE;
var ahPos = new Float32Array(ahCount * 3);
var ahOff = new Float32Array(ahCount);
var ahEI = new Uint16Array(ahCount);
for (var e = 0; e < ahEdges.length; e++)
  for (var p = 0; p < ahPE; p++) {
    var i = e * ahPE + p;
    ahOff[i] = p / ahPE + Math.random() * 0.08;
    ahEI[i] = e;
  }
var ahGeo = new THREE.BufferGeometry();
ahGeo.setAttribute('position', new THREE.BufferAttribute(ahPos, 3));
pivot.add(new THREE.Points(ahGeo, new THREE.PointsMaterial({
  color: 0xFFD700, size: 0.09, transparent: true, opacity: 0.9,
  sizeAttenuation: true, depthWrite: false,
})));

// Agent → Hub glow particles
var ahGlowPos = new Float32Array(ahCount * 3);
var ahGlowGeo = new THREE.BufferGeometry();
ahGlowGeo.setAttribute('position', new THREE.BufferAttribute(ahGlowPos, 3));
pivot.add(new THREE.Points(ahGlowGeo, new THREE.PointsMaterial({
  color: 0xFFD700, size: 0.24, transparent: true, opacity: 0.2,
  sizeAttenuation: true, depthWrite: false,
})));

// ==================== HOVER / TOOLTIP / CLICK ====================

var tooltip = document.getElementById('tooltip');
var tooltipName = tooltip.querySelector('.name');
var tooltipDesc = tooltip.querySelector('.desc');
var raycaster = new THREE.Raycaster();
var mouse = new THREE.Vector2();
var hoveredNode = null;
var selectedAgent = null;
var hitMeshes = allNodes.map(function(n) { return n.mesh; });

window.addEventListener('pointermove', function(ev) {
  mouse.x = (ev.clientX / innerWidth) * 2 - 1;
  mouse.y = -(ev.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  var hits = raycaster.intersectObjects(hitMeshes, false);
  if (hits.length > 0) {
    var hit = hits[0].object;
    var node = allNodes.find(function(n) { return n.mesh === hit; });
    if (node && node !== hoveredNode) {
      hoveredNode = node;
      tooltipName.textContent = node.name;
      if (node.desc) { tooltipDesc.textContent = node.desc; tooltipDesc.style.display = 'block'; }
      else tooltipDesc.style.display = 'none';
      tooltip.style.opacity = '1';
      document.body.style.cursor = 'pointer';
    }
    if (node) {
      tooltip.style.left = ev.clientX + 'px';
      tooltip.style.top = (ev.clientY - 60) + 'px';
    }
  } else if (hoveredNode) {
    hoveredNode = null;
    tooltip.style.opacity = '0';
    document.body.style.cursor = 'auto';
  }
});

renderer.domElement.addEventListener('click', function() {
  if (hoveredNode && hoveredNode.type === 'agent') {
    selectedAgent = selectedAgent === hoveredNode ? null : hoveredNode;
  } else if (!hoveredNode) {
    selectedAgent = null;
  }
});

// ==================== RESIZE ====================

window.addEventListener('resize', function() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ==================== ANIMATE ====================

var clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  var t = clock.getElapsedTime();

  // Breathing — hub and agents only, leaves are still
  for (var n = 0; n < allNodes.length; n++) {
    var nd = allNodes[n];
    if (nd.type === 'hub') {
      var s = 1.0 + Math.sin(t * (2 * Math.PI / 4) + nd.phase) * 0.15;
      nd.mesh.scale.setScalar(s);
    } else if (nd.type === 'agent') {
      var s = 1.0 + Math.sin(t * (2 * Math.PI / 3) + nd.phase) * 0.08;
      nd.mesh.scale.setScalar(s);
    }
  }

  // Hub aura pulse
  hubHalo1.material.opacity = 0.55 + Math.sin(t * 0.8) * 0.05;
  hubHalo2.material.opacity = 0.35 + Math.sin(t * 0.6 + 1) * 0.05;
  hubHalo3.material.opacity = 0.22 + Math.sin(t * 0.5 + 2) * 0.03;
  hubHalo4.material.opacity = 0.10 + Math.sin(t * 0.4 + 3) * 0.02;
  hubHalo5.material.opacity = 0.04 + Math.sin(t * 0.3 + 4) * 0.01;

  // Source → Agent particles
  for (var i = 0; i < saCount; i++) {
    var ei = saEI[i];
    var edge = saEdges[ei];
    var frac = ((saOff[i] + t * 0.5) % 1 + 1) % 1;
    saPos[i*3]   = edge.from.x + (edge.to.x - edge.from.x) * frac;
    saPos[i*3+1] = edge.from.y + (edge.to.y - edge.from.y) * frac;
    saPos[i*3+2] = edge.from.z + (edge.to.z - edge.from.z) * frac;
  }
  saGeo.attributes.position.needsUpdate = true;

  // Agent → Hub particles
  for (var i = 0; i < ahCount; i++) {
    var ei = ahEI[i];
    var edge = ahEdges[ei];
    var frac = ((ahOff[i] + t * 0.8) % 1 + 1) % 1;
    var px = edge.from.x + (edge.to.x - edge.from.x) * frac;
    var py = edge.from.y + (edge.to.y - edge.from.y) * frac;
    var pz = edge.from.z + (edge.to.z - edge.from.z) * frac;
    ahPos[i*3] = px; ahPos[i*3+1] = py; ahPos[i*3+2] = pz;
    ahGlowPos[i*3] = px; ahGlowPos[i*3+1] = py; ahGlowPos[i*3+2] = pz;
  }
  ahGeo.attributes.position.needsUpdate = true;
  ahGlowGeo.attributes.position.needsUpdate = true;

  // Parallax stars — driven by orbit controls accumulation
  var pixelScale = 200;
  _starOffsetX = controls.thetaAccum * pixelScale;
  _starOffsetY = controls.phiAccum * pixelScale;
  drawStars(_starOffsetX, _starOffsetY);

  // Leaf label visibility — hover only
  for (var n = 0; n < allNodes.length; n++) {
    if (allNodes[n].type !== 'leaf') continue;
    var children = allNodes[n].mesh.children;
    for (var c = 0; c < children.length; c++) {
      if (children[c].isSprite && children[c].userData.labelStyle === 'leaf') {
        var isHov = hoveredNode && hoveredNode.mesh === allNodes[n].mesh;
        var target = isHov ? 1.0 : 0.0;
        children[c].material.opacity += (target - children[c].material.opacity) * 0.15;
      }
    }
  }

  // Click selection — dim non-related nodes
  if (selectedAgent) {
    for (var n = 0; n < allNodes.length; n++) {
      var nd = allNodes[n];
      var isSelected = nd.mesh === selectedAgent.mesh;
      var isHub = nd.type === 'hub';
      var isRelatedLeaf = false;
      if (nd.type === 'leaf') {
        for (var e = 0; e < srcToAgentEdges.length; e++) {
          if (srcToAgentEdges[e].from === nd.mesh.position && srcToAgentEdges[e].to === selectedAgent.mesh.position) {
            isRelatedLeaf = true; break;
          }
        }
      }
      var targetOp = (isSelected || isHub || isRelatedLeaf) ? 0.95 : 0.2;
      nd.mesh.material.opacity += (targetOp - nd.mesh.material.opacity) * 0.1;
      if (nd.type === 'leaf') {
        var children = nd.mesh.children;
        for (var c = 0; c < children.length; c++) {
          if (children[c].isSprite && children[c].userData.labelStyle === 'leaf') {
            if (isRelatedLeaf) children[c].material.opacity += (1.0 - children[c].material.opacity) * 0.15;
          }
        }
      }
    }
  } else {
    for (var n = 0; n < allNodes.length; n++) {
      allNodes[n].mesh.material.opacity += (0.95 - allNodes[n].mesh.material.opacity) * 0.1;
    }
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
